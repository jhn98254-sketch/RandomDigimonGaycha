<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-터미널 & 도감 완성본</title>
<style>
  body {
    display: flex;
    flex-direction: column; 
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #222;
    font-family: 'NeoDunggeunmo', 'Courier New', Courier, monospace;
    padding: 10px; /* 여백 축소 */
    box-sizing: border-box;
  }
  
  .main-container {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: flex-start; /* 상단 정렬 */
    flex-wrap: wrap; 
    width: 100%;
  }

  /* --- D-터미널 기기 (반응형 수정) --- */
  #device {
    background: linear-gradient(135deg, #e0e4e5, #b8bcc0);
    border: 3px solid #777;
    border-radius: 20px 40px 20px 20px; 
    max-width: 480px; /* 최대 너비 제한 */
    width: 100%;      /* 화면에 맞춰 늘어남 */
    padding: 20px 15px;
    box-shadow: inset 5px 5px 10px rgba(255,255,255,0.7), inset -5px -5px 15px rgba(0,0,0,0.2), 10px 10px 20px rgba(0,0,0,0.5);
    text-align: center;
    box-sizing: border-box;
  }

  #bezel {
    background-color: #111;
    border: 2px solid #333;
    padding: 15px;
    border-radius: 15px 15px 35px 35px;
    margin-bottom: 20px;
  }

  #screen {
    background-color: #ffffff; 
    height: 250px; /* 모바일 고려하여 높이 약간 축소 */
    width: 100%;
    border-radius: 3px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
    box-shadow: inset 3px 3px 10px rgba(0,0,0,0.3);
  }

  #digimon-img {
    max-width: 90%; /* 화면 너비에 맞춰 조절 */
    max-height: 90%;
    width: auto;
    height: auto;
    object-fit: contain;
    mix-blend-mode: multiply; 
    display: none; 
  }

  /* --- 도감 패널 (반응형 수정) --- */
  #dictionary-panel {
    background: linear-gradient(135deg, #2c3e50, #1a252f);
    border: 4px solid #555;
    border-radius: 15px;
    max-width: 480px; /* 기기 너비와 맞춤 */
    width: 100%;
    min-height: 400px; 
    padding: 20px;
    color: #ecf0f1;
    box-shadow: 10px 10px 20px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }

  /* ⭐️ 모바일 최적화 미디어 쿼리 ⭐️ */
  @media (max-width: 600px) {
    #device {
      padding: 15px 10px;
    }
    #screen {
      height: 200px; /* 아주 작은 화면에서는 액정 높이 더 축소 */
    }
    .btn {
      padding: 10px 15px;
      font-size: 13px; /* 버튼 글자 크기 조절 */
    }
    .dict-header {
      font-size: 16px;
    }
  }

  /* 나머지 스타일(버튼, 대화창 등)은 기존과 동일 */
  #egg-img { width: 60px; height: 90px; object-fit: contain; mix-blend-mode: multiply; }
  #error-text { font-size: 50px; color: #4a8a7a; mix-blend-mode: multiply; display: none; }
  #crest-img { width: 120px; height: 120px; object-fit: contain; mix-blend-mode: multiply; display: none; animation: blink 0.6s infinite alternate; }
  @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0.3; } }
  #dialog-box { background-color: #f8f9fa; border: 3px solid #555; border-radius: 5px; padding: 12px; min-height: 50px; text-align: left; font-size: 13px; margin-bottom: 15px; }
  .speaker { font-weight: bold; color: #e74c3c; }
  .btn-group { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; }
  .btn { background: linear-gradient(to bottom, #e74c3c, #c0392b); color: white; border: 2px solid #8e2a21; border-radius: 20px; padding: 12px 18px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 0 #7b241c; transition: all 0.1s; }
  .btn-reset { background: linear-gradient(to bottom, #3498db, #2980b9); border-color: #1f618d; box-shadow: 0 4px 0 #1a5276; }
  .btn-bgm { background: linear-gradient(to bottom, #2ecc71, #27ae60); border-color: #1e8449; box-shadow: 0 4px 0 #145a32; }
  .btn:active { transform: translateY(4px); box-shadow: none; }
  .dict-row { margin-bottom: 10px; font-size: 14px; border-bottom: 1px dashed #7f8c8d; padding-bottom: 5px; }
  .dict-label { color: #f1c40f; font-weight: bold; margin-right: 10px; }
  .dict-desc-box { margin-top: 10px; background-color: #111; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; border: 2px inset #000; color: #1abc9c; }
  .footer-text { margin-top: 20px; color: #888; font-size: 10px; text-align: center; }
</style>
</head>
<body>

<div class="main-container">
  <div id="device">
    <div id="bezel">
      <div id="screen">
        <img id="egg-img" src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 120'%3E%3Cpath d='M50 0 C20 0, 10 50, 10 80 C10 110, 30 120, 50 120 C70 120, 90 110, 90 80 C90 50, 80 0, 50 0 Z' fill='%23111' /%3E%3Ctext x='50' y='80' font-family='sans-serif' font-size='50' fill='white' text-anchor='middle' font-weight='bold'%3E?%3C/text%3E%3C/svg%3E" alt="디지타마">
        <div id="error-text">❌</div>
        <img id="crest-img" src="" alt="통신 문장">
        <img id="digimon-img" src="" alt="디지몬 이미지">
      </div>
    </div>
    <div id="bgm-player" style="display: none;"></div>
    <div id="dialog-box">
      <span class="speaker">D-터미널:</span><br>
      <span id="message">디지털 월드와 연결되었습니다. 데이터를 수신할까요?</span>
    </div>
    <div class="btn-group">
      <button class="btn" id="btn-start" onclick="startGacha()">데이터 수신</button>
      <button class="btn btn-reset" id="btn-reset" onclick="resetGacha()" style="display: none;">처음으로</button>
      <button class="btn btn-bgm" id="btn-bgm" onclick="toggleBgm()" style="display: none;">🎵 BGM 끄기</button>
    </div>
  </div>

  <div id="dictionary-panel">
    <div class="dict-header">디지몬 도감 (Analyzer)</div>
    <div class="dict-row"><span class="dict-label">이름:</span> <span id="dict-name">-</span></div>
    <div class="dict-row"><span class="dict-label">레벨:</span> <span id="dict-level">-</span></div>
    <div class="dict-row"><span class="dict-label">타입:</span> <span id="dict-type">-</span></div>
    <div class="dict-row"><span class="dict-label">속성:</span> <span id="dict-attr">-</span></div>
    <div style="margin-top: 15px; font-weight: bold; color: #f1c40f;">▶ 특징 및 설명:</div>
    <div class="dict-desc-box" id="dict-desc">데이터 수신 대기 중...</div>
  </div>
</div>

<div class="footer-text">
  비상업적 팬 프로젝트입니다. (Data & Sprites: Digi-API / Crests: Namuwiki)<br>
  © Akiyoshi Hongo, Toei Animation, Bandai.
</div>

<script>
  // 유튜브 API 로드
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  let player;
  let hasBgmStarted = false; 
  let isBgmPlaying = false;  
  const youtubeVideoId = "5BONQ39cP9k";

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('bgm-player', {
      height: '0', width: '0', videoId: youtubeVideoId,
      playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': youtubeVideoId, 'controls': 0 }
    });
  }

  const eggImg = document.getElementById('egg-img');
  const errorText = document.getElementById('error-text');
  const digimonImg = document.getElementById('digimon-img');
  const crestImg = document.getElementById('crest-img');
  const message = document.getElementById('message');
  const btnStart = document.getElementById('btn-start');
  const btnReset = document.getElementById('btn-reset');
  const btnBgm = document.getElementById('btn-bgm');

  const levelDict = { "Fresh": "유아기", "In Training": "유년기", "Rookie": "성장기", "Champion": "성숙기", "Ultimate": "완전체", "Mega": "궁극체", "Armor": "아머체" };
  const attrDict = { "Vaccine": "백신", "Data": "데이터", "Virus": "바이러스", "Free": "프리", "Variable": "배리어블", "Unknown": "불명" };
  const crestImages = [
    "https://i.namu.wiki/i/a0ausIeRe_g-4xIkK_iHm5qydKwhGVNUemDN393K-U76vi5ABIb80pAkBlRpN8g7LRodPqT33zPx1bkOCv7W0QDjW6S4_NTY-tIdHkqlB7RhUWSrZQBx1QIYStZhmxf5EGWtOXvAjanDH6jpVWTAhw.webp",
    "https://i.namu.wiki/i/7pnEuLU7kkhO10kSO2e-vOGMRw-bg1rD5DtMZe14AzQnlbQUrL42THNN-Ej5yqhivho3CVjcaAzvByK8ZKVmpK3QPK3DehsZW1X8Teh84Q_NxzQ00ztpGMjgsoTspkWH50MwUGa6uuYi1k0FaQUWhg.webp",
    "https://i.namu.wiki/i/q2g592ZkFDzoZrJ9dm8XSyzAeGCebyQG_QnN9nAjwvkxrHf3amteVvlrH-oGJTA0b8Hn1POIswuUDXrf52WgTIt34Wga1POrZvXg8QkZDkCAKZYQ49xrBH3u0Vh0-bks0zd8kliZSThD7mFUobZ6CQ.webp",
    "https://i.namu.wiki/i/NdkxoNfLRpt6e7_QiqodYjpQawYd5YcIRrudDxUX6iYNZm4Dc4QZcq89AOPHMtPrjDmUiKfTISRNC8HgbMoeNzrHBor4W8VnB1lRMhnR9o9JWmO_2ccOQymQw0ytTfMuqvIDmxEsbI6kPD9LVV9BBQ.webp",
    "https://i.namu.wiki/i/ab5nwilRgjKl2HjQAwPe9mAHMa-BuBOBmUe-lT0SjPH9oKodKSP7sWa5lsruARU__9ImnEtJygFGHBEGtdm-r730xUELzCkyZASab1tSoDIf7ZSvLDlj8mNoWMpP02AzsWwJYQHqZ9ujdqBPS2QpBw.webp",
    "https://i.namu.wiki/i/yB3E9kO9-5VF7iLNKRZFOdGMCPnszt34F6xMbbNd1QLYkl3GEDNMXRza-wXsxWVHFmIpV7Lbwm-RhyKIl4pZ1m6gq0Xp5d2coHrLEhicFwjactzzPkuGA8C_JthUzHcltWWhAgyG04YrdX9cTdIqBg.webp",
    "https://i.namu.wiki/i/fHokGeKHj8Lfmxll5KnK1fBVq9xkDsnMdQUTLRIZgQ23RBlYDmpCrcJgWEo9FGX4EHuHMAuv01dKSQiK8wWnctB53ImGwMQ2vzuL121g3LnDBkaLmmD1pkgKwKiu6QeiEIXZjg-Gi5lPTmYxK73ZyA.webp",
    "https://i.namu.wiki/i/h4ABkijej72dQsQAZifVtcpbqjKAd3Oa01Yp8cper5WIvfWPgAfCNz-aZwJodqII0mFfOE9WTdz9mi_bGMt42PqgBUPUcS12oatWdKyH826CXTm1e43OLDSgLednBzJ9XXCj1-whwg7hirec4j0dQw.webp",
    "https://i.namu.wiki/i/pfWlvErhrjUYZ052AsaOY3pI2132i0BM9h-Ohgp0MvvvpsrZUe_8B87AIRUHyaOhjojwk9WRP7M5wFD9iEMxYke6OkuPqsEHzN7DOmZregOs8LImuxYVzCi4Pjk_Z84MLA4M1GFNr01SRQATmHpalg.webp"
  ];

  async function translateText(text) {
    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ko&dt=t&q=${encodeURIComponent(text)}`;
      const res = await fetch(url);
      const data = await res.json();
      return data[0].map(x => x[0]).join("");
    } catch (e) { return text; }
  }

  function toggleBgm() {
    if (isBgmPlaying) { player.pauseVideo(); isBgmPlaying = false; btnBgm.innerText = "🔇 BGM 켜기"; }
    else { player.playVideo(); isBgmPlaying = true; btnBgm.innerText = "🎵 BGM 끄기"; }
  }

  async function startGacha() {
    btnReset.style.display = 'block';
    if (!hasBgmStarted && player) { player.playVideo(); hasBgmStarted = true; isBgmPlaying = true; btnBgm.style.display = 'block'; }

    eggImg.style.display = 'none'; errorText.style.display = 'none'; digimonImg.style.display = 'none';
    document.getElementById('dict-name').innerText = "분석 중...";
    document.getElementById('dict-level').innerText = "-";
    document.getElementById('dict-type').innerText = "-";
    document.getElementById('dict-attr').innerText = "-";
    document.getElementById('dict-desc').innerText = "데이터 수신 중...";

    const randomCrestIndex = Math.floor(Math.random() * crestImages.length);
    crestImg.src = crestImages[randomCrestIndex];
    crestImg.style.display = 'block'; 
    message.innerText = "통신 중입니다... 삐빅-";
    btnStart.disabled = true;

    try {
      const randomId = Math.floor(Math.random() * 1400) + 1; // 안전하게 1400개 범위로 설정
      const response = await fetch(`https://digi-api.com/api/v1/digimon/${randomId}`);
      if (!response.ok) throw new Error("API Error");
      const digimonData = await response.json();

      // ⭐️ 오류 수정 포인트: name은 리스트가 아니라 문자열입니다.
      const finalName = digimonData.name;
      const rawLevel = digimonData.levels?.[0]?.level || "Unknown";
      const korLevel = levelDict[rawLevel] || rawLevel;
      const type = digimonData.types?.[0]?.type || "불명";
      const rawAttr = digimonData.attributes?.[0]?.attribute || "Unknown";
      const korAttr = attrDict[rawAttr] || rawAttr;

      let descText = "설명이 없습니다.";
      if (digimonData.descriptions?.length > 0) {
        const enDesc = digimonData.descriptions.find(d => d.language === "en");
        descText = enDesc ? enDesc.description : digimonData.descriptions[0].description;
      }

      setTimeout(async () => {
        crestImg.style.display = 'none'; 
        digimonImg.src = digimonData.images[0].href;
        digimonImg.style.display = 'block'; 
        message.innerHTML = `수신 완료!<br><strong>${finalName}</strong> (${korLevel})`;
        
        document.getElementById('dict-name').innerText = finalName;
        document.getElementById('dict-level').innerText = korLevel;
        document.getElementById('dict-type').innerText = type;
        document.getElementById('dict-attr').innerText = korAttr;

        const translatedDesc = await translateText(descText);
        document.getElementById('dict-desc').innerText = translatedDesc;

        btnStart.innerText = "다시 수신하기";
        btnStart.disabled = false;
      }, 1500);

    } catch (e) {
      message.innerHTML = "오류: 통신이 끊어졌습니다.";
      crestImg.style.display = 'none'; errorText.style.display = 'block';
      btnStart.disabled = false;
      document.getElementById('dict-desc').innerText = "데이터 수신 실패";
    }
  }

  function resetGacha() {
    digimonImg.style.display = 'none'; crestImg.style.display = 'none'; errorText.style.display = 'none'; eggImg.style.display = ''; 
    message.innerText = "데이터를 수신할까요?";
    btnStart.innerText = "데이터 수신"; btnReset.style.display = 'none';
  }
</script>
</body>
</html>
